<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sector Cineris — Crónicas</title>
  <meta name="description" content="Archivo de lore y trasfondo del mundo.">

  <!-- Tipografías imperiales (si no hay conexión, se usan fuentes del sistema) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Barra superior -->
  <header class="topbar">
    <button class="menu-btn" id="menuBtn" aria-label="Menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>

    <a class="brand" href="#/">
      <span class="aquila">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4.4c.85 0 1.5.7 1.5 1.55S12.85 7.5 12 7.5s-1.5-.7-1.5-1.55S11.15 4.4 12 4.4z"/>
          <path d="M12 7.6c2.6 2 5.7 2.5 9.2 1.9-2.6 1.2-4.2 2.9-4.5 5.1C14.9 13 13.5 12.7 12 12.7s-2.9.3-4.7 1.9C7 12.4 5.4 10.7 2.8 9.5 6.3 10.1 9.4 9.6 12 7.6z"/>
          <path d="M12 12.7v6.9M9.4 16l2.6 3.6L14.6 16"/>
        </svg>
      </span>
      <span class="titles">
        <span class="world-name" id="brandName">Sector Cineris</span>
        <span class="world-sub" id="brandSub">Crónicas</span>
      </span>
    </a>

    <span class="spacer"></span>

    <div class="search">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </span>
      <input id="searchInput" type="search" placeholder="Buscar en el archivo…" autocomplete="off" spellcheck="false" aria-label="Buscar">
    </div>
  </header>

  <!-- Navegación lateral (se genera por JS) -->
  <nav class="sidebar" id="sidebar"><div id="nav"></div></nav>
  <div class="scrim" id="scrim"></div>

  <!-- Contenido principal (se genera por JS) -->
  <main class="main">
    <div id="app"></div>
    <footer class="foot">Archivo del Sector Cineris · Que ningún nombre se pierda en la ceniza</footer>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
